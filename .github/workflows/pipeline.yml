# ══════════════════════════════════════════════════════════════════
#  GitHub Actions — CI/CD Pipeline
#  springboot-simple-store
#
#  Registry: GitHub Container Registry (GHCR)
#  → Nenhum secret extra necessário! Usa GITHUB_TOKEN automático.
#
#  Fluxo: Build → Test → Docker Push → Staging → [aprovação] → Production
# ══════════════════════════════════════════════════════════════════

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # ex: famel-svg/-actions-springboot_simple_store

jobs:

# ── JOB 1: BUILD ──────────────────────────────────────────────────
  build:
    name: "🔨 Build Maven"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Compilar com Maven
        run: ./mvnw clean package -DskipTests -B

      - name: Publicar JAR como artefato
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 7

# ── JOB 2: TEST ───────────────────────────────────────────────────
  test:
    name: "🧪 Testes Automatizados"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Executar testes (H2 in-memory)
        run: ./mvnw test -B -Dspring.profiles.active=test

      - name: Publicar relatório de testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/

# ── JOB 3: DOCKER BUILD & PUSH → GHCR ────────────────────────────
  docker:
    name: "🐳 Docker → GHCR"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados (tags e labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=raw,value=build-${{ github.run_number }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resumo da imagem publicada
        run: |
          echo "✅ Imagem publicada no GHCR:"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | sed 's/^/   /'

# ── JOB 4: DEPLOY STAGING ─────────────────────────────────────────
  deploy-staging:
    name: "🚀 Deploy → Staging"
    runs-on: ubuntu-latest
    needs: docker
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy no ambiente Staging
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║          DEPLOY  —  STAGING                 ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "  Imagem : ghcr.io/${{ github.repository }}:build-${{ github.run_number }}"
          echo "  Commit : ${{ github.sha }}"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  Data   : $(date '+%Y-%m-%d %H:%M:%S')"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "Manifests Kubernetes aplicados:"
          echo "  kubectl apply -f kubernetes/namespace.yml"
          echo "  kubectl apply -f kubernetes/postgres-staging.yml"
          echo "  kubectl apply -f kubernetes/app-staging.yml"
          echo ""
          echo "✅ Deploy em STAGING concluído com sucesso!"

# ── JOB 5: DEPLOY PRODUCTION (com aprovação manual) ───────────────
  deploy-production:
    name: "🏭 Deploy → Production"
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy no ambiente Production
        run: |
          echo "╔══════════════════════════════════════════════╗"
          echo "║          DEPLOY  —  PRODUCTION              ║"
          echo "╠══════════════════════════════════════════════╣"
          echo "  Imagem : ghcr.io/${{ github.repository }}:build-${{ github.run_number }}"
          echo "  Commit : ${{ github.sha }}"
          echo "  Branch : ${{ github.ref_name }}"
          echo "  Data   : $(date '+%Y-%m-%d %H:%M:%S')"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "Manifests Kubernetes aplicados:"
          echo "  kubectl apply -f kubernetes/namespace.yml"
          echo "  kubectl apply -f kubernetes/postgres-production.yml"
          echo "  kubectl apply -f kubernetes/app-production.yml"
          echo ""
          echo "✅ Deploy em PRODUCTION concluído com sucesso!"
