---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: staging
data:
  SPRING_PROFILES_ACTIVE: "dev"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-service:5432/storedb_staging"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-store
  namespace: staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: springboot-store
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: springboot-store
    spec:
      containers:
        - name: springboot-store
          image: ghcr.io/GITHUB_USER/REPO_NAME:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          readinessProbe:
            httpGet:
              path: /users
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: springboot-store-service
  namespace: staging
spec:
  selector:
    app: springboot-store
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer
