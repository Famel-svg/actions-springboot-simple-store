spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/simple_store}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:store_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:store_pass}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
server.port=8080
